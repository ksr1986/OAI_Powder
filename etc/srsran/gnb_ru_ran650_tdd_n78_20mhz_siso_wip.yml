cu_cp:
  amf:
    addr: 192.168.1.1
    bind_addr: 192.168.1.2
    supported_tracking_areas:
      - tac: 1                        
        plmn_list:
          - plmn: "99999"
            tai_slice_support_list:
              - sst: 1    
                sd: 1

ru_ofh:
  t1a_max_cp_dl: 470
  t1a_min_cp_dl: 285
  t1a_max_cp_ul: 429
  t1a_min_cp_ul: 285
  t1a_max_up: 350
  t1a_min_up: 125
  ta4_max: 180
  ta4_min: 50
  is_prach_cp_enabled: true
  compr_method_ul: bfp
  compr_bitwidth_ul: 9
  compr_method_dl: bfp
  compr_bitwidth_dl: 9
  compr_method_prach: bfp
  compr_bitwidth_prach: 9
  enable_ul_static_compr_hdr: true
  enable_dl_static_compr_hdr: true
  iq_scaling: 8.0
  cells:                               
    - network_interface: 0000:43:00.0
      ru_mac_addr: 98:ae:71:04:90:c7
      du_mac_addr: 30:3e:a7:1a:99:49
      vlan_tag_cp: 28
      vlan_tag_up: 28
      prach_port_id: [4]
      dl_port_id: [0]
      ul_port_id: [0]

cell_cfg:
  dl_arfcn: 641668
  band: 48
  channel_bandwidth_MHz: 20
  common_scs: 30
  plmn: "99999"
  tac: 1
  pci: 1
  nof_antennas_dl: 1
  nof_antennas_ul: 1
  prach:
    prach_config_index: 159
    prach_root_sequence_index: 0
    zero_correlation_zone: 0
    prach_frequency_start: 0
  pucch:
    sr_period_ms: 20
    f0_or_f1_nof_cell_res_sr: 15
    f2_or_f3_or_f4_nof_cell_res_csi: 15
  csi:
    csi_rs_period: 40
  pusch:
    dmrs_additional_position: 2
  tdd_ul_dl_cfg:
    nof_dl_slots: 7
    nof_dl_symbols: 6
    nof_ul_symbols: 2
    nof_ul_slots: 2

log:
  filename: /tmp/gnb.log
  all_level: info

pcap:
  mac_enable: false
  mac_filename: /tmp/gnb_mac.pcap
  ngap_enable: false
  ngap_filename: /tmp/gnb_ngap.pcap
