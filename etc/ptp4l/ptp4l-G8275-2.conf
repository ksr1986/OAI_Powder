#
# Powder G8275.2 on Dell switch and Fibrolan GM
# Mostly from:
# https://linuxptp.nwtime.org/documentation/configs/g-8275-2/
# but our version of ptp4l still uses the master/slave terminology
#
[global]
dataset_comparison		G.8275.x
G.8275.defaultDS.localPriority	128
maxStepsRemoved			255
logAnnounceInterval		0
#masterOnly			0
#serverOnly			0
G.8275.portDS.localPriority	128
hybrid_e2e			1
inhibit_multicast_service	1
unicast_listen			1
unicast_req_duration		60
domainNumber			44

# Powder specific
slaveOnly			1
#clientOnly			1
unicast_master_table		1
logSyncInterval			-4
logMinDelayReqInterval		-4

[unicast_master_table]
table_id		1
logQueryInterval	2
UDPv4			10.201.1.1
