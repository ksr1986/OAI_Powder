#
# Powder G8275.1 on Dell switch and Fibrolan GM
# Mostly from:
# https://linuxptp.nwtime.org/documentation/configs/g-8275-1/
# but our version of ptp4l still uses the master/slave terminology
#
# Note: the fronthaul interface is determined at runtime by setup-ptp.sh
# via getptpiface and passed to ptp4l via the systemd template service
# (ptp4l@<iface>.service), so no [interface] section is needed here.
#
[global]
dataset_comparison		G.8275.x
G.8275.defaultDS.localPriority	128
maxStepsRemoved			255
# logAnnounceInterval: keep at -3 (every 125ms) per G8275.1 telecom standard;
# do not change to 1 (2s) as that is too slow for O-RAN fronthaul.
logAnnounceInterval		-3
announceReceiptTimeout		3
logSyncInterval			-4
logMinDelayReqInterval		-4
delay_mechanism			E2E
#masterOnly			0
#serverOnly			0
G.8275.portDS.localPriority	128
#ptp_dst_mac			01:80:C2:00:00:0E
network_transport		L2
domainNumber			24
priority1			128
priority2			128
# Powder specific
slaveOnly			1
#clientOnly			1
tx_timestamp_timeout		100
ptp_dst_mac			01:1B:19:00:00:00
dscp_event			46
dscp_general			46
logging_level			6
verbose				1
use_syslog			0
